# render.yaml — Render Blueprint for Blindspot AI
services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: blindspot-api
    runtime: docker
    dockerfilePath: ./blindspot-api/Dockerfile
    dockerContext: ./blindspot-api
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in the Render dashboard

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  - type: web
    name: blindspot-frontend
    runtime: docker
    dockerfilePath: ./blindspot/Dockerfile
    dockerContext: ./blindspot
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        # Set to your blindspot-api Render URL after backend is live
        value: https://blindspot-api.onrender.com
